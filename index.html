<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Wedding</title>

  <style>
    body {
      margin: 0;
      font-family: "Georgia", serif;
      background: #f8f5f2;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      max-width: 350px;
      width: 90%;
    }

    img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    h1 {
      margin: 10px 0;
      font-size: 26px;
    }

    p {
      margin: 5px 0 20px;
      color: #777;
    }

  </style>
</head>

<body>

  <div class="card">
    <!-- COVER IMAGE -->
    <img src="1-1129.jpg" alt="Wedding Photo">

    <!-- NAMES -->
    <h1>Risto & Anastasia</h1>

    <!-- DATE -->
    <p>August 03 2024</p>

    <!-- AUDIO -->
        <!-- Audio -->
    <div class="audio-player">
      <audio controls="" autoplay="" loop="">
        <source src="i belong to you.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>
    </div>

  </div>

  <script>
    function playSong() {
      const song = document.getElementById("song");
      song.play();
    }
  </script>

</body>
</html>
