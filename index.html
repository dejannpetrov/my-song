<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risto & Anastasia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500&family=Montserrat:wght@300&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
    color: white;
    text-align: center;
}

/* Cover */
.cover {
    position: absolute;
    width: 100%;
    height: 100vh;
    background: url('1-1129.jpg') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    backdrop-filter: brightness(0.7);
}

/* Text */
h1 {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    margin: 0;
}

.date {
    margin-top: 10px;
    font-size: 1.2rem;
    letter-spacing: 2px;
}

/* Button */
button {
    margin-top: 30px;
    padding: 12px 25px;
    border: none;
    border-radius: 30px;
    background: rgba(255,255,255,0.2);
    color: white;
    font-size: 1rem;
    backdrop-filter: blur(10px);
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: rgba(255,255,255,0.4);
}

/* Particles */
canvas {
    position: absolute;
    top: 0;
    left: 0;
}

/* Responsive */
@media (max-width: 600px) {
    h1 {
        font-size: 2.2rem;
    }
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="cover">
    <h1>Risto & Anastasia</h1>
    <div class="date">August 03, 2024</div>

    <button onclick="toggleMusic()">Play Music</button>
</div>

<audio id="music" loop>
    <source src="song.mp3" type="audio/mp3">
</audio>

<script>
// MUSIC
let playing = false;
const music = document.getElementById("music");
const button = document.querySelector("button");

function toggleMusic() {
    if (!playing) {
        music.play();
        button.innerText = "Stop Music";
        playing = true;
    } else {
        music.pause();
        button.innerText = "Play Music";
        playing = false;
    }
}

// PARTICLES
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for (let i = 0; i < 60; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2,
        dx: Math.random() - 0.5,
        dy: Math.random() - 0.5
    });
}

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = "white";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();

        p.x += p.dx;
        p.y += p.dy;

        if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
    });

    requestAnimationFrame(draw);
}

draw();

// Resize fix
window.addEventListener("resize", () => {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>

</body>
</html>
