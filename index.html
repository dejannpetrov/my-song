<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risto & Anastasia</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
}

/* Canvas always visible */
canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: 0;
}

/* Content on top */
.cover {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100vh;
    background: url('1-1129.jpg');
    background-repeat: no-repeat;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
}

/* Dark overlay */
.cover::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    z-index: 1;
}

h1, .date, button {
    z-index: 2;
}

h1 {
    font-size: 2.5rem;
}

button {
    margin-top: 20px;
    padding: 10px 20px;
    border: none;
    border-radius: 20px;
    background: rgba(255,255,255,0.3);
    color: white;
    font-size: 1rem;
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="cover">
    <h1>Risto & Anastasia</h1>
    <div class="date">August 03, 2024</div>
    <button onclick="toggleMusic()">Play Music</button>
</div>

<audio id="music" loop>
    <source src="song.mp3" type="audio/mp3">
</audio>

<script>
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// PARTICLES
let particles = [];
for (let i = 0; i < 100; i++) {
    particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        dx: (Math.random() - 0.5) * 1,
        dy: (Math.random() - 0.5) * 1,
        size: Math.random() * 2 + 1
    });
}

let active = false;

// DRAW LOOP
function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "white";

    particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();

        if (active) {
            p.x += p.dx;
            p.y += p.dy;

            if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
            if (p.y < 0 || p.y > canvas.height) p.dy *= -1;
        }
    });

    requestAnimationFrame(animate);
}
animate();

// MUSIC CONTROL
const music = document.getElementById("music");
const button = document.querySelector("button");

let playing = false;

function toggleMusic() {
    if (!playing) {
        music.play().catch(() => {
            alert("Tap again to start music (iPhone restriction)");
        });
        active = true;
        button.innerText = "Stop Music";
        playing = true;
    } else {
        music.pause();
        active = false;
        button.innerText = "Play Music";
        playing = false;
    }
}
</script>

</body>
</html>
