<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Risto & Anastasia</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Allura&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

html, body {
    height: 100%;
    background: black;
    overflow: hidden;
}

/* FULL SCREEN FIX */
.container {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
}

/* IMAGE FIX (CENTERED PROPERLY) */
.cover {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center; /* KEY FIX */
    transform: scale(1.02); /* slight zoom to avoid edge gaps */
    filter: brightness(0.72);
}

/* PARTICLES */
canvas {
    position: absolute;
    inset: 0;
}

/* CONTENT */
.overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
}

/* NAME STYLE FIX */
.names {
    font-family: 'Allura', cursive;
    font-size: 52px;
    color: white;
    text-shadow: 0 2px 20px rgba(0,0,0,0.6);
    letter-spacing: 1px;
}

    .date {
    font-family: 'Playfair Display', serif;
    margin-top: 10px;
    font-size: 15px;
    letter-spacing: 3px;
    color: rgba(255,255,255,0.9);
    text-shadow: 0 2px 10px rgba(0,0,0,0.4);
}

/* BUTTON */
button {
    background: rgba(255,255,255,0.85);
    color: #111;
    border: 1px solid rgba(255,255,255,0.3);
    backdrop-filter: blur(10px);
}

button:active {
    transform: scale(0.95);
}

/* MOBILE FIX */
@media (max-width: 500px) {
    .names {
        font-size: 42px;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- YOUR IMAGE -->
    <img class="cover" src="1-1129.jpg" alt="wedding">

    <canvas id="particles"></canvas>

    <div class="overlay">
        <div class="names">Risto & Anastasia</div>
        <div class="date">August 03, 2024</div>
        <button id="btn">Play Music</button>
    </div>

</div>

<audio id="music" src="song.mp3"></audio>

<script>
const btn = document.getElementById("btn");
const music = document.getElementById("music");
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

let playing = false;

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

/* PARTICLES */
let particles = [];

function init() {
    particles = [];
    for (let i = 0; i < 70; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            speed: Math.random() * 0.6 + 0.2,
            size: Math.random() * 2
        });
    }
}
init();

function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle = "white";

    particles.forEach(p => {

        if (playing) {
            p.y -= p.speed;
            if (p.y < 0) p.y = canvas.height;
        }

        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fill();
    });

    requestAnimationFrame(draw);
}
draw();

/* MUSIC CONTROL */
btn.onclick = () => {
    if (!playing) {
        music.play();
        playing = true;
        btn.textContent = "Stop Music";
    } else {
        music.pause();
        playing = false;
        btn.textContent = "Play Music";
    }
};
</script>

</body>
</html>
