<!DOCTYPE html>
<html>
<head>
  <title>Play Song</title>
</head>
<body style="text-align:center; margin-top:50px;">
  <h1>Tap to Play</h1>
  
  <audio id="audio" autoplay>
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <button onclick="document.getElementById('audio').play()">
    ▶ Play Song
  </button>
</body>
</html>
