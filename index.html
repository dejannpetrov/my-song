<!DOCTYPE html>
<html>
<head>
  <title>Play Song</title>
</head>
<body style="text-align:center; margin-top:50px;">
  <h1>Tap to Play</h1>

  <audio id="audio">
    <source src="song.mp3" type="audio/mpeg">
  </audio>

  <button style="font-size:30px; padding:20px;"
    onclick="document.getElementById('audio').play()">
    ▶ PLAY
  </button>
</body>
</html>
